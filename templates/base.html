<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Can you create a ticket for this?{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f5f7;
      color: #172b4d;
      min-height: 100vh;
    }

    header {
      background: #0052cc;
      color: #fff;
      padding: 14px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.2rem; font-weight: 700; }
    header .logo { font-size: 1.5rem; }

    main {
      max-width: 960px;
      margin: 40px auto;
      padding: 0 24px;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,.12);
      padding: 28px 32px;
      margin-bottom: 24px;
    }

    h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; color: #172b4d; }
    h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 10px; }

    label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; }

    textarea, input[type="text"], select {
      width: 100%;
      padding: 10px 12px;
      border: 2px solid #dfe1e6;
      border-radius: 4px;
      font-size: 0.9rem;
      font-family: inherit;
      transition: border-color .15s;
    }
    textarea:focus, input[type="text"]:focus, select:focus {
      outline: none;
      border-color: #0052cc;
    }
    textarea { resize: vertical; min-height: 100px; }

    .btn {
      display: inline-block;
      padding: 10px 22px;
      border-radius: 4px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background .15s;
    }
    .btn-primary { background: #0052cc; color: #fff; }
    .btn-primary:hover { background: #0747a6; }
    .btn-success { background: #00875a; color: #fff; }
    .btn-success:hover { background: #006644; }
    .btn-danger { background: #de350b; color: #fff; }
    .btn-danger:hover { background: #bf2600; }
    .btn-secondary { background: #f4f5f7; color: #172b4d; border: 2px solid #dfe1e6; }
    .btn-secondary:hover { background: #ebecf0; }

    .alert {
      padding: 12px 16px;
      border-radius: 4px;
      margin-bottom: 20px;
      font-size: 0.88rem;
    }
    .alert-error { background: #ffebe6; border-left: 4px solid #de350b; color: #bf2600; }
    .alert-info  { background: #e6f0ff; border-left: 4px solid #0052cc; color: #0052cc; }
    .alert-success { background: #e3fcef; border-left: 4px solid #00875a; color: #006644; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-blue   { background: #deebff; color: #0052cc; }
    .badge-green  { background: #e3fcef; color: #00875a; }
    .badge-red    { background: #ffebe6; color: #de350b; }
    .badge-yellow { background: #fffae6; color: #974f00; }
    .badge-gray   { background: #f4f5f7; color: #5e6c84; }

    .form-row { margin-bottom: 16px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <header>
    <span class="logo">🎫</span>
    <h1>Can you create a ticket for this?</h1>
    <nav style="margin-left:auto;display:flex;gap:8px;">
      <a href="/" style="color:#fff;opacity:.85;text-decoration:none;font-size:.88rem;font-weight:600;padding:6px 14px;border-radius:4px;transition:opacity .15s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.85">Home</a>
      <a href="/settings" style="color:#fff;opacity:.85;text-decoration:none;font-size:.88rem;font-weight:600;padding:6px 14px;border-radius:4px;background:rgba(255,255,255,.15);transition:opacity .15s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.85">⚙️ Settings</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
